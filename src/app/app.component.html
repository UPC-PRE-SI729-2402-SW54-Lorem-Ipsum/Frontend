<header>
  <h1>LawConnect</h1>
  <nav>
    <ul>
      <li>Inicio</li>
      <li>Notificaciones</li>
      <li>Casos</li>
      <li>Para Abogados</li>
    </ul>
  </nav>
</header>

<div *ngIf="!registered" class="registration-form">
  <h2>LawConnect (Abogados)</h2>
  <form (ngSubmit)="register()">
    <input type="text" [(ngModel)]="newLawyer.function" name="function" placeholder="Función" required>
    <input type="text" [(ngModel)]="newLawyer.id" name="id" placeholder="DNI/Pasaporte" required>
    <input type="text" [(ngModel)]="newLawyer.ciudad" name="ciudad" placeholder="Ciudad" required>
    <label>Certificado</label><br />
    <input type="file" (change)="onFileChange($event)" required>
    <button type="submit">Registrarse</button>
  </form>
</div>

<main *ngIf="registered">
  <div class="profile">
    <div class="user-info">
      <img src="assets/images/abogado696.jpg" width="250px">
      <br><br />
      <img src="assets/images/images.png" alt="Cámara" class="camera-icon">
      <h2>Pedro Gallego Alcantara</h2>
      <img src="assets/images/Check-Logo.png" alt="Verificado" class="check-icon">
      <br><br />
      <p>Abogado de violencia familiar</p>
    </div>
    <br />
    <button class="consultar">Consultar</button>

    <h3>Proponer Precios</h3>
    <header>
      <div class="pricing-options">
        <div class="pricing-option" *ngFor="let option of options; let i = index" (click)="toggleOption(i)">
          <span>{{ option.text }}</span>
          <span [ngClass]="{'selected': option.selected}"></span>
        </div>
      </div>
    </header>

    <aside>
      <h3>Más Perfiles en Común</h3>
      <div *ngFor="let lawyer of lawyers" class="lawyer-profile">
        <h4>{{ lawyer.name }}</h4>
        <img [src]="lawyer.image" width="200px">
        <p>{{ lawyer.function }}</p>
        <div class="stars">
          <span>⭐⭐⭐⭐⭐</span>
        </div>
        <button>Ver Perfil</button>
        <hr />
      </div>
    </aside>
  </div>
</main>
